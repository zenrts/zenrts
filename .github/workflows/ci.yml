name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-latest, windows-latest]
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        exclude:
          - os: macos-13
            compiler: gcc
          - os: macos-latest
            compiler: gcc
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
        include:
          - os: windows-latest
            compiler: msvc
            build_type: Debug
            shell: pwsh
          - os: windows-latest
            compiler: msvc
            build_type: Release
            shell: pwsh

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup compiler (GCC/Clang)
        if: matrix.compiler != 'msvc'
        run: |
          echo "CC=${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DZENRTS_BUILD_TESTS=ON -DZENRTS_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }} --parallel

      - name: Benchmark (Unix)
        if: runner.os != 'Windows'
        run: ./build/benchmarks/benchmark_zenrts

  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        sanitizer:
          - name: ASAN
            flags: -fsanitize=address -fno-omit-frame-pointer
          - name: UBSAN
            flags: -fsanitize=undefined -fno-omit-frame-pointer
          - name: TSAN
            flags: -fsanitize=thread -fno-omit-frame-pointer

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="${{ matrix.sanitizer.flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizer.flags }}"
          -DZENRTS_BUILD_TESTS=ON
          -DZENRTS_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel --config Debug

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel -C Debug
