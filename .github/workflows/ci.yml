name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    if: github.ref_type != 'tag'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        exclude:
          - os: macos-latest
            compiler: gcc
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
        include:
          - os: windows-latest
            compiler: msvc
            build_type: Debug
            shell: pwsh
          - os: windows-latest
            compiler: msvc
            build_type: Release
            shell: pwsh
          - os: ubuntu-latest
            compiler: gcc
            build_type: Debug
            coverage: true
          - os: ubuntu-latest
            compiler: clang
            build_type: Debug
          - os: ubuntu-24.04-arm
            compiler: gcc
            build_type: Debug
            coverage: true
          - os: ubuntu-24.04-arm
            compiler: clang
            build_type: Debug
          - os: macos-latest
            compiler: clang
            build_type: Debug

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup compiler (GCC/Clang)
        if: matrix.compiler != 'msvc'
        run: |
          echo "CC=${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}" >> $GITHUB_ENV

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DZENRTS_BUILD_TESTS=ON
          -DZENRTS_BUILD_BENCHMARKS=${{ matrix.coverage && 'OFF' || 'ON' }}
          ${{ matrix.coverage && '-DZENRTS_BUILD_COVERAGE=ON' || '' }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }} --parallel -V

      - name: Benchmark (Unix)
        if: runner.os != 'Windows' && !matrix.coverage && matrix.build_type == 'Release'
        run: ./build/benchmarks/benchmark_zenrts --benchmark_filter="BM_Post|BM_TaskLatency|BM_Timer|BM_Cancel|BM_Version" --benchmark_min_time=0.1s

      - name: Install lcov
        if: matrix.coverage
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install lcov
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq lcov
          fi

      - name: Generate coverage report
        if: matrix.coverage
        run: |
          lcov --capture -d build --output-file coverage.info \
            --branch-coverage \
            --ignore-errors unused,version,empty,inconsistent,mismatch
          lcov --remove coverage.info -o coverage.info \
            '/usr/*' '*/_deps/*' '*/tests/*' '*/benchmarks/*' \
            '*/googletest/*' '*/googlebenchmark/*' \
            --ignore-errors unused,empty,inconsistent,mismatch
          lcov --list coverage.info --ignore-errors empty,inconsistent,mismatch

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          flags: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}
          fail_ci_if_error: false

  sanitizers:
    if: github.ref_type != 'tag'
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        sanitizer:
          - name: ASAN
            flags: -fsanitize=address -fno-omit-frame-pointer
          - name: UBSAN
            flags: -fsanitize=undefined -fno-omit-frame-pointer
          - name: TSAN
            flags: -fsanitize=thread -fno-omit-frame-pointer

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="${{ matrix.sanitizer.flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizer.flags }}"
          -DZENRTS_BUILD_TESTS=ON
          -DZENRTS_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel --config Debug

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel -C Debug -V

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-amd64
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            arch: linux-arm64
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: macos-latest
            arch: macos-arm64
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            arch: windows-amd64
            compiler: msvc
            shell: pwsh

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup compiler (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DZENRTS_BUILD_TESTS=OFF -DZENRTS_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release --prefix ${{ runner.temp }}/zenrts-${{ matrix.arch }}

      - name: Generate checksum
        run: python3 ${{ github.workspace }}/scripts/checksum.py ${{ runner.temp }}/zenrts-${{ matrix.arch }}

      - name: Include LICENSE
        run: cp ${{ github.workspace }}/LICENSE ${{ runner.temp }}/zenrts-${{ matrix.arch }}/

      - name: Package
        run: tar -C ${{ runner.temp }}/zenrts-${{ matrix.arch }} -czf ${{ runner.temp }}/zenrts-${{ matrix.arch }}.tar.gz .

      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ runner.temp }}/zenrts-${{ matrix.arch }}.tar.gz
