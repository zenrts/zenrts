name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            arch: amd64
            compiler: clang
            cc: clang
            cxx: clang++
          - os: ubuntu-24.04-arm
            arch: arm64
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            arch: arm64
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-13
            arch: amd64
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            arch: arm64
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            arch: amd64
            compiler: msvc
            shell: pwsh
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup compiler (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DZENRTS_BUILD_TESTS=ON -DZENRTS_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

      - name: Benchmark (Unix)
        if: runner.os != 'Windows'
        run: ./build/benchmarks/benchmark_zenrts

  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        sanitizer:
          - name: ASAN
            flags: -fsanitize=address -fno-omit-frame-pointer
          - name: UBSAN
            flags: -fsanitize=undefined -fno-omit-frame-pointer
          - name: TSAN
            flags: -fsanitize=thread -fno-omit-frame-pointer

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          fi

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="${{ matrix.sanitizer.flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizer.flags }}"
          -DZENRTS_BUILD_TESTS=ON
          -DZENRTS_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel
